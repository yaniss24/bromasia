<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi perfil · BromasIA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:white;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid #1a1a2e}
.logo{font-size:1.4rem;font-weight:800;text-decoration:none;color:white}
.logo span{color:#8A5CFF}
.container{max-width:500px;margin:0 auto;padding:40px 20px}
h1{font-size:1.8rem;font-weight:800;margin-bottom:8px}
.subtitle{color:#888;margin-bottom:32px}
.card{background:#12121f;border:1px solid #2a2a3a;border-radius:16px;padding:24px;margin-bottom:16px}
.card-label{font-size:12px;color:#8A5CFF;font-weight:600;text-transform:uppercase;margin-bottom:8px}
.card-value{font-size:1.1rem;font-weight:600}
.creditos-big{font-size:3rem;font-weight:800;color:#8A5CFF;margin:8px 0}
.creditos-sub{color:#888;font-size:14px}
.btn{display:block;width:100%;padding:16px;border-radius:12px;font-size:1rem;font-weight:700;text-align:center;cursor:pointer;border:none;margin-bottom:12px;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#8A5CFF,#b44fff);color:white}
.btn-secondary{background:#1a1a2e;border:1px solid #2a2a3a;color:white}
.btn-danger{background:transparent;border:1px solid #ff4444;color:#ff4444}
.divider{height:1px;background:#1a1a2e;margin:24px 0}
</style>

<style>
.hamburger-btn{display:none;background:none;border:none;cursor:pointer;padding:8px;flex-direction:column;gap:5px}
.hamburger-btn span{display:block;width:22px;height:2px;background:white;border-radius:2px}
.side-menu{position:fixed;top:0;left:-100%;width:280px;height:100vh;background:#0d0d1a;border-right:1px solid #2a2a3a;z-index:2000;transition:left 0.3s;padding:24px;display:flex;flex-direction:column}
.side-menu.open{left:0}
.side-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1999}
.side-overlay.open{display:block}
.side-close{background:none;border:none;color:white;font-size:1.5rem;cursor:pointer;align-self:flex-end;margin-bottom:16px}
.side-user{background:#1a1a2e;border-radius:12px;padding:12px 16px;margin-bottom:24px}
.side-user-label{font-size:11px;color:#8A5CFF;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.side-user-email{font-size:13px;color:white;word-break:break-all}
.side-item{display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:10px;color:white;text-decoration:none;font-size:15px;font-weight:500;margin-bottom:4px;cursor:pointer;background:none;border:none;width:100%;text-align:left}
.side-item:hover{background:#1a1a2e}
.side-item-icon{font-size:1.2rem;width:24px;text-align:center}
.side-divider{height:1px;background:#1a1a2e;margin:12px 0}
.side-item-danger{color:#ff4444}
.side-creditos{font-size:12px;color:#8A5CFF;font-weight:700;margin-left:auto}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Bromas<span>IA</span></a>
</nav>

<div class="container">
  <h1>Mi perfil</h1>
  <p class="subtitle">Gestiona tu cuenta y créditos</p>

  <div class="card">
    <div class="card-label">Email</div>
    <div class="card-value" id="email">Cargando...</div>
  </div>

  <div class="card">
    <div class="card-label">Créditos disponibles</div>
    <div class="creditos-big" id="creditos">–</div>
    <div class="creditos-sub">10 créditos = 1 broma generada</div>
  </div>

  <a href="#" class="btn btn-primary" id="btn-recargar">💳 Recargar créditos</a>
  <a href="/categorias" class="btn btn-secondary">🎯 Generar una broma</a>

  <div class="divider"></div>

  <a href="#" class="btn btn-danger" id="btn-salir">Cerrar sesión</a>
</div>

<script>
const SURL = "https://xnrhnmrghxtrrylnlnuv.supabase.co";
const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhucmhubXJnaHh0cnJ5bG5sbnV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzY3MDQsImV4cCI6MjA5NDk1MjcwNH0.fx6Ryf_R_8Tqrf_OlELZ0dWeSK14RABJ6gBn7DPJWKY";
const sb = supabase.createClient(SURL, SKEY);

(async function() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/login'; return; }

  document.getElementById('email').textContent = session.user.email;

  const res = await fetch('/api/creditos', { headers: { 'Authorization': 'Bearer ' + session.access_token } });
  const data = await res.json();
  document.getElementById('creditos').textContent = data.creditos ?? 0;

  document.getElementById('btn-salir').addEventListener('click', async (e) => {
    e.preventDefault();
    await sb.auth.signOut();
    window.location.href = '/';
  });

  document.getElementById('btn-recargar').addEventListener('click', (e) => {
    e.preventDefault();
    window.location.href = '/precios';
  });
})();
</script>

<script>
(async function() {
  const SURL = "https://xnrhnmrghxtrrylnlnuv.supabase.co";
  const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhucmhubXJnaHh0cnJ5bG5sbnV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzY3MDQsImV4cCI6MjA5NDk1MjcwNH0.fx6Ryf_R_8Tqrf_OlELZ0dWeSK14RABJ6gBn7DPJWKY";
  const sb = supabase.createClient(SURL, SKEY);
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;

  // Mostrar hamburger
  const btn = document.getElementById('hamburger-btn');
  if (btn) btn.style.display = 'flex';

  // Ocultar nav-btns normales si existen
  const navBtns = document.querySelector('.nav-btns') || document.querySelector('.nav-right');
  if (navBtns) {
    // Mantener solo el hamburger
    const links = navBtns.querySelectorAll('a:not(.logo)');
    links.forEach(l => l.style.display = 'none');
  }

  // Cargar datos
  document.getElementById('side-email').textContent = session.user.email;
  try {
    const res = await fetch('/api/creditos', { headers: { 'Authorization': 'Bearer ' + session.access_token } });
    const data = await res.json();
    document.getElementById('side-creditos').textContent = (data.creditos ?? 0) + ' créditos';
  } catch(e) {}

  // Abrir/cerrar menú
  const menu = document.getElementById('side-menu');
  const overlay = document.getElementById('side-overlay');
  btn.addEventListener('click', () => { menu.classList.add('open'); overlay.classList.add('open'); });
  document.getElementById('side-close').addEventListener('click', () => { menu.classList.remove('open'); overlay.classList.remove('open'); });
  overlay.addEventListener('click', () => { menu.classList.remove('open'); overlay.classList.remove('open'); });

  // Logout
  document.getElementById('side-logout').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '/';
  });
})();
</script>

</body>
</html>

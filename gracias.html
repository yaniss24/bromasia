<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! · BromasIA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d1a; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #13132a; border: 1px solid #8A5CFF; border-radius: 20px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; }
    .emoji { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 2rem; font-weight: 900; margin-bottom: 12px; }
    h1 span { color: #8A5CFF; }
    p { color: #aaa; font-size: 1rem; line-height: 1.6; margin-bottom: 32px; }
    .btn { display: block; background: #8A5CFF; color: white; text-decoration: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .btn:hover { background: #7a4de0; }
    .btn-secondary { display: block; color: #aaa; text-decoration: none; padding: 12px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>¡Tus créditos <span>están listos!</span></h1>
    <p>Gracias por tu compra. Ya puedes generar bromas ultra realistas con IA. ¡Que empiece la diversión!</p>
    <a href="/generador" class="btn">🎭 Generar mi primera broma</a>
    <a href="/" class="btn-secondary">Volver al inicio</a>
  </div>
</body>
</html>

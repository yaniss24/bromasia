<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro · BromasIA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; color:white; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { background:#13131a; border:1px solid #2a2a3a; border-radius:20px; padding:40px; width:100%; max-width:420px; }
.logo { font-size:24px; font-weight:800; margin-bottom:8px; }
.logo span { color:#8A5CFF; }
h1 { font-size:1.5rem; margin-bottom:6px; }
p { color:#888; font-size:14px; margin-bottom:28px; }
.badges { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.badge { font-size:12px; color:#8A5CFF; background:#8A5CFF20; padding:4px 10px; border-radius:20px; }
label { display:block; font-size:13px; color:#aaa; margin-bottom:6px; }
input { width:100%; background:#0a0a0f; border:1px solid #2a2a3a; border-radius:10px; padding:12px 16px; color:white; font-size:15px; margin-bottom:16px; outline:none; }
input:focus { border-color:#8A5CFF; }
.btn { width:100%; background:#8A5CFF; color:white; border:none; border-radius:10px; padding:14px; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:12px; }
.btn:hover { background:#7c3aed; }
.btn-google { background:#13131a; border:1px solid #2a2a3a; color:white; }
.btn-google:hover { background:#1a1a2e; }
.link { text-align:center; font-size:13px; color:#888; }
.link a { color:#8A5CFF; text-decoration:none; }
.error { background:#ff000020; border:1px solid #ff000040; border-radius:8px; padding:10px 14px; font-size:13px; color:#ff6b6b; margin-bottom:16px; display:none; }
.success { background:#00ff0020; border:1px solid #00ff0040; border-radius:8px; padding:10px 14px; font-size:13px; color:#6bff6b; margin-bottom:16px; display:none; }
.sep { text-align:center; color:#444; font-size:13px; margin:16px 0; position:relative; }
.sep::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:#2a2a3a; }
.sep span { background:#13131a; padding:0 12px; position:relative; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Bromas<span>IA</span></div>
  <h1>Crear cuenta gratis</h1>
  <p>Tu prank está a 10 segundos</p>
  <div class="badges">
        <span class="badge">✓ Gratis</span>
        <span class="badge">✓ Sin tarjeta</span>
        <span class="badge">✓ 100% anónimo</span>
  </div>
  <div class="error" id="error"></div>
  <div class="success" id="success"></div>
  <button class="btn btn-google" onclick="loginGoogle()">🔑 Continuar con Google</button>
  <div class="sep"><span>o</span></div>
  <label>Email</label>
  <input type="email" id="email" placeholder="tu@email.com">
  <label>Contraseña</label>
  <input type="password" id="password" placeholder="Mínimo 6 caracteres">
  <button class="btn" onclick="registro()">Crear cuenta gratis →</button>
  <div class="link">¿Ya tienes cuenta? <a href="/login">Iniciar sesión</a></div>
</div>
<script>
const { createClient } = supabase;
const sb = createClient('https://xnrhnmrghxtrrylnlnuv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhucmhubXJnaHh0cnJ5bG5sbnV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzY3MDQsImV4cCI6MjA5NDk1MjcwNH0.fx6Ryf_R_8Tqrf_OlELZ0dWeSK14RABJ6gBn7DPJWKY');

async function registro() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if (password.length < 6) { showError('La contraseña debe tener al menos 6 caracteres'); return; }
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) { showError(error.message); return; }
  if (data?.user) {
    await sb.from('usuarios').upsert({ id: data.user.id, email: email, creditos: 0 });
  }
  document.getElementById('success').textContent = '¡Cuenta creada! Revisa tu email para confirmar.';
  document.getElementById('success').style.display = 'block';
  setTimeout(() => window.location.href = '/', 3000);
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: 'https://bromasia.com' } });
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
